version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: thanni-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-thanniuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_strong_password}
    volumes:
      - mongo_data:/data/db
    networks:
      - thanni-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thanni-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://${MONGO_USER:-thanniuser}:${MONGO_PASSWORD:-changeme_strong_password}@mongodb:27017/?authSource=admin
      DB_NAME: ${DB_NAME:-thanni_canuuu}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      WHATSAPP_SERVICE_URL: http://whatsapp-service:3001
      SERVICE_API_KEY: ${SERVICE_API_KEY:-changeme_service_api_key}
      SECRET_KEY: ${SECRET_KEY:-changeme_jwt_secret}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - thanni-network
    volumes:
      - backend_static:/app/static

  # WhatsApp Service
  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: thanni-whatsapp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      FASTAPI_URL: http://backend:8000
      SERVICE_API_KEY: ${SERVICE_API_KEY:-changeme_service_api_key}
      PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
    depends_on:
      - backend
    networks:
      - thanni-network
    volumes:
      - whatsapp_auth:/app/auth_info

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: thanni-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - thanni-network

  # Nginx Reverse Proxy (Production)
  nginx-proxy:
    image: nginx:alpine
    container_name: thanni-proxy
    restart: unless-stopped
    ports:
      - "443:443"
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - whatsapp-service
    networks:
      - thanni-network

volumes:
  mongo_data:
    driver: local
  backend_static:
    driver: local
  whatsapp_auth:
    driver: local

networks:
  thanni-network:
    driver: bridge
